name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Release
    runs-on: ubuntu-latest
    env:
      HUSKY: 0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install

      - name: Run verification gate
        run: bun run check

      - name: Build CLI
        run: bun run build

      - name: Pack release assets
        run: |
          mkdir -p release
          safe_tag="${GITHUB_REF_NAME//\//-}"
          cp dist/cli.js "release/ponytrail-${safe_tag}.js"
          npm pack --ignore-scripts --pack-destination release
          ls -la release

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* --title "$GITHUB_REF_NAME" --generate-notes
